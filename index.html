<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | QR-code component</title>
 
</head>
<body>
  <div class="container">
<p class="QR-Code">
  <img src="./images/image-qr-code.png" alt="QR code to Frontend Mentor">
</p>
  <h1 class="heading">Improve your front-end skills by building projects</h1>
  <h2 class="description">Scan the QR-code to visit Frontend Mentor and take your coding skills to the next level</h2>
  </div>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Vainavi Vaibav</a>.
  </footer>
</body>
</html>
